<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tracker Semanal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:#FAFAFA;color:#111;-webkit-font-smoothing:antialiased}
button{font-family:inherit}

.container{max-width:1400px;margin:0 auto;padding:20px 16px 60px}
.header h1{font-size:20px;font-weight:700;letter-spacing:-.5px}
.header p{font-size:11px;color:#999;margin-top:2px;letter-spacing:.3px}

.week-nav{display:flex;align-items:center;justify-content:space-between;margin:16px 0}
.week-nav button{background:none;border:1px solid #E5E5E5;border-radius:6px;cursor:pointer;font-size:16px;color:#999;padding:4px 10px}
.week-nav span{font-size:13px;font-weight:600}

.progress{margin-bottom:16px}
.progress-top{display:flex;justify-content:space-between;margin-bottom:4px}
.progress-top .lbl{font-size:10px;color:#999;text-transform:uppercase;letter-spacing:.5px}
.progress-top .pct{font-size:11px;font-weight:700}
.pbar{background:#E5E5E5;border-radius:2px;height:3px}
.pfill{height:100%;background:#111;border-radius:2px;transition:width .4s}

.tabs{display:flex;border-bottom:1px solid #E5E5E5;margin-bottom:20px;overflow-x:auto}
.tabs button{background:none;border:none;border-bottom:2px solid transparent;padding:8px 12px;cursor:pointer;font-size:12px;font-weight:400;color:#999;white-space:nowrap}
.tabs button.active{border-bottom-color:#111;font-weight:600;color:#111}

/* ═══ TIMELINE ═══ */
.timeline-wrap{display:flex;gap:0;overflow-x:auto;position:relative}
.time-gutter{width:36px;flex-shrink:0;position:relative;padding-top:36px}
.time-gutter .tick{position:absolute;left:0;width:100%;font-size:8px;color:#BBB;text-align:right;padding-right:4px;transform:translateY(-5px);font-variant-numeric:tabular-nums}
.day-col{flex:1;min-width:120px;border-left:1px solid #F0F0F0;position:relative}
.day-col-head{text-align:center;padding:6px 0;border-bottom:1px solid #E5E5E5;height:36px;position:sticky;top:0;background:#FAFAFA;z-index:2}
.day-col-head.today{border-bottom:2px solid #111}
.day-col-head .name{font-size:11px;font-weight:700}
.day-col-head .date{font-size:9px;color:#999}
.day-col-body{position:relative}
.hour-line{position:absolute;left:0;right:0;border-top:1px solid #F5F5F5;pointer-events:none}
.lunch-zone{position:absolute;left:0;right:0;background:repeating-linear-gradient(45deg,transparent,transparent 4px,#F8F8F8 4px,#F8F8F8 5px);pointer-events:none;z-index:0}

.tblock{
  position:absolute;left:3px;right:3px;border-radius:6px;padding:3px 6px;
  cursor:pointer;user-select:none;touch-action:none;overflow:hidden;
  border:1px solid rgba(0,0,0,.08);transition:opacity .15s;z-index:1;
}
.tblock.done{opacity:.45}
.tblock.dragging{opacity:.2}
.tblock .tb-top{display:flex;align-items:center;gap:3px}
.tblock .tb-icon{font-size:10px;flex-shrink:0}
.tblock .tb-name{font-size:10px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.tblock.done .tb-name{text-decoration:line-through}
.tblock .tb-time{font-size:8px;opacity:.7;margin-top:0}
.tblock .tb-check{
  width:12px;height:12px;border-radius:2px;border:1.5px solid rgba(0,0,0,.2);
  flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;
  background:transparent;font-size:7px;color:#FFF;
}
.tblock .tb-check.checked{background:rgba(0,0,0,.4);border:none}
.tblock .tb-check.checked::after{content:'✓'}
.tblock .tb-resize{
  position:absolute;left:0;right:0;bottom:0;height:6px;cursor:ns-resize;
  display:flex;align-items:center;justify-content:center;
}
.tblock .tb-resize::after{content:'';width:16px;height:2px;background:rgba(0,0,0,.12);border-radius:1px}
.tblock .tb-note{font-size:8px;color:rgba(0,0,0,.45);line-height:1.3;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Ghost */
.ghost{position:fixed;z-index:9999;pointer-events:none;background:#FFF;border-radius:8px;padding:6px 10px;border:1.5px solid #111;box-shadow:0 8px 20px rgba(0,0,0,.15);font-size:11px;font-weight:600;max-width:200px;opacity:.95;transform:translate(-50%,-50%)}

/* ═══ DAY LIST VIEW ═══ */
.day-pills{display:flex;gap:4px;margin-bottom:16px}
.day-pill{flex:1;padding:6px 0;border-radius:8px;border:1px solid #E5E5E5;background:transparent;cursor:pointer;text-align:center}
.day-pill.today{border:1.5px solid #BBB}
.day-pill.active{border:1.5px solid #111;background:#111}
.day-pill .nm{font-size:11px;font-weight:600;color:#111}
.day-pill.active .nm{color:#FFF}
.day-pill .st{font-size:9px;color:#999}
.day-pill.active .st{color:rgba(255,255,255,.5)}
.dlabel{font-size:11px;font-weight:600;color:#999;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.dlist{display:flex;flex-direction:column;gap:6px;margin-bottom:20px}

.lcard{
  background:#FFF;border-radius:10px;padding:12px 14px;
  border:1px solid #E5E5E5;transition:opacity .15s;position:relative;
}
.lcard.done{opacity:.5}
.lcard .lc-top{display:flex;align-items:flex-start;gap:10px}
.lc-check{width:18px;height:18px;border-radius:4px;border:1.5px solid #CCC;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;margin-top:1px;background:transparent}
.lc-check.checked{background:#111;border:none}
.lc-check.checked::after{content:'✓';color:#FFF;font-size:10px}
.lc-info{flex:1;min-width:0}
.lc-title{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.lc-title .icon{font-size:14px}
.lc-title .name{font-size:13px;font-weight:600}
.lcard.done .lc-title .name{text-decoration:line-through}
.lc-meta{display:flex;align-items:center;gap:8px;margin-top:2px}
.lc-meta .time{font-size:11px;color:#999}
.lc-meta .dur{font-size:10px;font-weight:600;padding:1px 5px;border-radius:3px}
.lc-meta .rt{font-size:10px;font-weight:600}
.lc-meta .rt.over{color:#EF4444}
.lc-meta .rt.under{color:#22C55E}
/* Height bar visualization */
.lc-hbar{margin-top:6px;display:flex;align-items:center;gap:6px}
.lc-hbar .bar-bg{flex:1;height:4px;background:#F0F0F0;border-radius:2px;position:relative}
.lc-hbar .bar-plan{height:100%;border-radius:2px;position:absolute;left:0;top:0}
.lc-hbar .bar-real{height:100%;border-radius:2px;position:absolute;left:0;top:0;opacity:.5}
.lc-hbar .bar-label{font-size:9px;color:#999;white-space:nowrap}

.lc-actions{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap}
.lc-actions button{background:none;border:none;padding:0;cursor:pointer;font-size:10px;color:#BBB;font-family:inherit}
.lc-actions button.has{color:#666}
.lc-detail{margin-top:8px}
.lc-detail p{font-size:11px;color:#666;line-height:1.5;margin:0 0 6px}
.abox{padding:6px 8px;background:#F8F8F8;border-radius:6px;border-left:2px solid #DDD}
.abox .al{font-size:9px;font-weight:700;color:#BBB;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.abox p{font-size:11px;color:#666;line-height:1.5;margin:0}
.note-show{margin-top:6px;padding:4px 8px;background:#FAFAFA;border-radius:5px;font-size:11px;color:#777;border-left:2px solid #E0E0E0}
.iedit{margin-top:6px;display:flex;gap:4px;align-items:center}
.iedit input{flex:1;padding:6px 8px;border-radius:5px;border:1px solid #DDD;font-size:11px;font-family:inherit;outline:none}
.iedit input[type=number]{width:70px;flex:none}
.iedit .u{font-size:10px;color:#999}
.iedit button{background:#111;color:#FFF;border:none;border-radius:5px;padding:6px 12px;cursor:pointer;font-size:11px;font-weight:600}

/* Summary */
.card{background:#FFF;border-radius:10px;padding:18px;border:1px solid #E5E5E5;margin-bottom:14px}
.card h3{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
.cr{margin-bottom:12px}
.cr .top{display:flex;justify-content:space-between;margin-bottom:3px}
.cr .top .nm{font-size:12px;font-weight:500}
.cr .top .ns{font-size:11px;color:#999}
.cb{background:#F0F0F0;border-radius:2px;height:3px}
.cf{height:100%;border-radius:2px;transition:width .3s}
.dbars{display:flex;gap:8px;align-items:flex-end}
.dbar{flex:1;text-align:center}
.dbar .cw{height:70px;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;margin-bottom:4px}
.dbar .cl{width:60%;border-radius:3px;transition:height .3s}
.dbar .dl{font-size:11px;font-weight:600}
.dbar .dv{font-size:10px;color:#999}
.tc{display:flex;gap:16px;font-size:13px}
.tc .it span{color:#999;font-size:11px;display:block}
.tc .it div{font-weight:700}
.nl .ni{padding:6px 8px;background:#FAFAFA;border-radius:5px;margin-bottom:6px}
.nl .ni .nt{font-size:11px;font-weight:600}
.nl .ni .nx{font-size:11px;color:#777;margin-top:1px}
.rbtn{display:block;margin:20px auto;background:none;border:1px solid #E5E5E5;border-radius:6px;padding:6px 16px;cursor:pointer;font-size:11px;color:#999}
.asec p.intro{font-size:12px;color:#999;margin-bottom:18px;line-height:1.6}
.acard{background:#FFF;border:1px solid #E5E5E5;border-radius:10px;padding:12px 14px;margin-bottom:6px}
.acard .at{font-size:13px;font-weight:600;margin-bottom:4px}
.acard .at .tt{font-size:10px;color:#999;font-weight:400}
.acard .ab{padding:6px 8px;background:#F8F8F8;border-radius:5px}
.acard .ab p{font-size:12px;color:#555;line-height:1.6;margin:0}

/* ═══ SIDEBAR ═══ */
.tl-layout{display:flex;gap:12px}
.tl-main{flex:1;min-width:0}
.tl-sidebar{width:220px;flex-shrink:0}
@media(max-width:900px){.tl-layout{flex-direction:column}.tl-sidebar{width:100%}}
.sidebar-card{background:#FFF;border:1px solid #E5E5E5;border-radius:10px;padding:14px;position:sticky;top:16px}
.sidebar-card h3{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#111;margin-bottom:10px}
.memo-add{display:flex;gap:4px;margin-bottom:10px}
.memo-add input{flex:1;padding:6px 8px;border:1px solid #E5E5E5;border-radius:6px;font-size:11px;font-family:inherit;outline:none}
.memo-add input:focus{border-color:#BBB}
.memo-add button{background:#111;color:#FFF;border:none;border-radius:6px;padding:4px 10px;cursor:pointer;font-size:11px;font-weight:600;font-family:inherit}
.memo-list{display:flex;flex-direction:column;gap:4px;max-height:400px;overflow-y:auto}
.memo-item{display:flex;align-items:flex-start;gap:6px;padding:6px 8px;background:#FAFAFA;border-radius:6px;font-size:11px;line-height:1.4;color:#444}
.memo-item.checked{opacity:.5}
.memo-item.checked .memo-text{text-decoration:line-through}
.memo-chk{width:14px;height:14px;border-radius:3px;border:1.5px solid #CCC;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;background:transparent;font-size:8px}
.memo-chk.on{background:#111;border:none;color:#FFF}
.memo-chk.on::after{content:'✓'}
.memo-text{flex:1;word-break:break-word}
.memo-del{background:none;border:none;cursor:pointer;font-size:10px;color:#CCC;padding:0;flex-shrink:0;margin-top:1px}
.memo-del:hover{color:#999}
.memo-empty{font-size:11px;color:#CCC;text-align:center;padding:12px 0}
.sb-notes{margin-top:14px;padding-top:12px;border-top:1px solid #F0F0F0}
.sb-notes h3{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#111;margin-bottom:8px}
.sb-note{padding:4px 6px;background:#FFFDE7;border-radius:4px;margin-bottom:4px;border-left:2px solid #EAB308;font-size:10px;color:#666;line-height:1.4}
.sb-note .sn-task{font-weight:600;color:#444}
.sb-links{margin-top:14px;padding-top:12px;border-top:1px solid #F0F0F0}
.sb-links h3{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#111;margin-bottom:8px}
.sl-add{display:flex;gap:4px;margin-bottom:6px}
.sl-add input{flex:1;padding:5px 7px;border:1px solid #E5E5E5;border-radius:5px;font-size:10px;font-family:inherit;outline:none}
.sl-add input:focus{border-color:#999}
.sl-add button{background:#111;color:#FFF;border:none;border-radius:5px;padding:3px 8px;cursor:pointer;font-size:10px;font-weight:600;font-family:inherit}
.sl-quick{display:flex;gap:3px;margin-bottom:8px;flex-wrap:wrap}
.sl-quick button{padding:3px 7px;border:1px solid #E5E5E5;border-radius:5px;background:#FFF;cursor:pointer;font-size:9px;font-family:inherit;color:#555}
.sl-quick button:hover{border-color:#999}
.sl-item{display:flex;align-items:center;gap:5px;padding:5px 7px;background:#FAFAFA;border-radius:5px;margin-bottom:3px;font-size:10px}
.sl-item .sl-ico{font-size:13px;flex-shrink:0}
.sl-item .sl-name{flex:1;color:#333;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;text-decoration:underline;text-decoration-color:#DDD;text-underline-offset:2px}
.sl-item .sl-name:hover{color:#111;text-decoration-color:#999}
.sl-item .sl-del{background:none;border:none;cursor:pointer;font-size:9px;color:#CCC;padding:0;flex-shrink:0}
.sl-item .sl-del:hover{color:#999}
.sl-empty{font-size:10px;color:#CCC;text-align:center;padding:8px 0}

/* ═══ LUNCH BLOCK ═══ */
.lunch-block{
  position:absolute;left:3px;right:3px;border-radius:6px;
  background:repeating-linear-gradient(135deg,#F5F5F5,#F5F5F5 4px,#EFEFEF 4px,#EFEFEF 5px);
  border:1px dashed #DDD;display:flex;align-items:center;justify-content:center;
  font-size:9px;color:#BBB;font-weight:600;letter-spacing:.3px;z-index:1;pointer-events:none;
}

/* ═══ TASK MODAL ═══ */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.3);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#FFF;border-radius:14px;padding:20px;max-width:400px;width:100%;box-shadow:0 16px 48px rgba(0,0,0,.15);max-height:90vh;overflow-y:auto}
.modal h3{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.modal .close-btn{margin-left:auto;background:none;border:none;font-size:18px;cursor:pointer;color:#999;padding:0 4px}
.modal .field{margin-bottom:12px}
.modal .field label{display:block;font-size:10px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.modal .field input,.modal .field textarea,.modal .field select{width:100%;padding:8px 10px;border:1px solid #E5E5E5;border-radius:6px;font-size:12px;font-family:inherit;outline:none;background:#FFF}
.modal .field input:focus,.modal .field textarea:focus{border-color:#999}
.modal .field textarea{resize:vertical;min-height:60px}
.modal .field-row{display:flex;gap:8px}
.modal .field-row .field{flex:1}
.modal .save-btn{background:#111;color:#FFF;border:none;border-radius:8px;padding:10px 0;width:100%;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;margin-top:4px}
.modal .task-color{width:12px;height:12px;border-radius:3px;flex-shrink:0}

/* Links in modal */
.links-section{margin-top:2px}
.links-section label{display:block;font-size:10px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.link-add{display:flex;gap:4px;margin-bottom:8px}
.link-add input{flex:1;padding:6px 8px;border:1px solid #E5E5E5;border-radius:6px;font-size:11px;font-family:inherit;outline:none}
.link-add input:focus{border-color:#999}
.link-add button{background:#111;color:#FFF;border:none;border-radius:6px;padding:4px 10px;cursor:pointer;font-size:11px;font-weight:600;font-family:inherit;white-space:nowrap}
.link-quick{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap}
.link-quick button{display:flex;align-items:center;gap:4px;padding:5px 10px;border:1px solid #E5E5E5;border-radius:6px;background:#FFF;cursor:pointer;font-size:10px;font-family:inherit;color:#444;transition:border-color .15s}
.link-quick button:hover{border-color:#999}
.link-quick button .lq-icon{font-size:14px}
.link-list{display:flex;flex-direction:column;gap:4px}
.link-item{display:flex;align-items:center;gap:6px;padding:6px 8px;background:#FAFAFA;border-radius:6px;font-size:11px}
.link-item .li-icon{font-size:14px;flex-shrink:0}
.link-item .li-name{flex:1;color:#333;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;text-decoration:underline;text-decoration-color:#DDD;text-underline-offset:2px}
.link-item .li-name:hover{color:#111;text-decoration-color:#999}
.link-item .li-del{background:none;border:none;cursor:pointer;font-size:10px;color:#CCC;padding:0;flex-shrink:0}
.link-item .li-del:hover{color:#999}

/* Link indicator in timeline block */
.tb-link{font-size:7px;opacity:.6;margin-left:2px}
.tb-close{position:absolute;top:1px;right:2px;background:none;border:none;font-size:9px;color:rgba(0,0,0,.2);cursor:pointer;padding:2px 3px;line-height:1;z-index:2;border-radius:3px}
.tb-close:hover{color:rgba(0,0,0,.5);background:rgba(0,0,0,.05)}
.tblock.dismissed{display:none}
</style>
</head>
<body>
<div id="app" class="container"></div>

function getWeekKey(d){d=new Date(d);const dy=d.getDay(),df=d.getDate()-dy+(dy===0?-6:1);const m=new Date(d.setDate(df));return`${m.getFullYear()}-${String(m.getMonth()+1).padStart(2,"0")}-${String(m.getDate()).padStart(2,"0")}`}
function weekDates(w){const[y,m,d]=w.split("-").map(Number);const mn=new Date(y,m-1,d);return DAYS.map((_,i)=>{const t=new Date(mn);t.setDate(mn.getDate()+i);return`${String(t.getDate()).padStart(2,"0")}/${String(t.getMonth()+1).padStart(2,"0")}`})}
function shiftW(w,n){const[y,m,d]=w.split("-").map(Number);return getWeekKey(new Date(y,m-1,d+n*7))}
function fmtW(w){const[y,m,d]=w.split("-").map(Number);const mn=new Date(y,m-1,d),fr=new Date(y,m-1,d+4);const ms=["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];return`${mn.getDate()} ${ms[mn.getMonth()]} — ${fr.getDate()} ${ms[fr.getMonth()]} ${fr.getFullYear()}`}
function fmtM(m){const h=Math.floor(m/60),mm=m%60;return h>0?(mm>0?h+"h"+mm:h+"h"):mm+"min"}
function todayS(){const t=new Date();return`${String(t.getDate()).padStart(2,"0")}/${String(t.getMonth()+1).padStart(2,"0")}`}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;")}

function dk(){return"tv3:d:"+S.week}
function sk(){return"tv3:s:"+S.week}

// Week number: returns ISO week number for alternating weeks
function getWeekNumber(weekKey){
  const[y,m,d]=weekKey.split("-").map(Number);
  const date=new Date(y,m-1,d);
  const jan1=new Date(date.getFullYear(),0,1);
  const days=Math.floor((date-jan1)/(24*60*60*1000));
  return Math.ceil((days+jan1.getDay()+1)/7);
}
function isWeekA(weekKey){return getWeekNumber(weekKey)%2===0}

function getDefaultSchedule(weekKey){
  const sched=JSON.parse(JSON.stringify(DS));
  // Auto-alternate Tuesday afternoon
  const wA=isWeekA(weekKey);
  // Find the alternating block (ter-4)
  const terIdx=sched.Ter.findIndex(t=>t.id==="ter-4");
  if(terIdx>=0){
    if(wA){
      sched.Ter[terIdx]={id:"ter-4",task:"📦 Estoque (Semana A)",icon:"📦",cat:"ecom",desc:"Embalar pedidos no estoque. Semana A — quinzenal.",mins:120};
    } else {
      sched.Ter[terIdx]={id:"ter-4",task:"🧠 Estudo IA (Semana B)",icon:"🧠",cat:"estudo",desc:"Estudo aprofundado de IA. Semana B — quinzenal.",mins:120};
    }
  }
  return sched;
}

function dStats(day){const t=S.sched[day].filter(x=>!S.data[x.id]?.dismissed),dn=t.filter(x=>S.data[x.id]?.done).length;return{done:dn,total:t.length,pct:t.length?Math.round(dn/t.length*100):0}}

// ══════ Compute timeline positions ══════
function computePositions(day){
  const tasks=S.sched[day];
  let cursor=START_HOUR*60;
  const positions=[];
  for(const t of tasks){
    if(S.data[t.id]?.dismissed) continue; // skip dismissed
    const mins=S.data[t.id]?.realMins??t.mins;
    if(cursor<LUNCH_START*60 && cursor+mins>LUNCH_START*60){
      if(cursor>=LUNCH_START*60){cursor=LUNCH_END*60;}
    }
    if(cursor>=LUNCH_START*60 && cursor<LUNCH_END*60) cursor=LUNCH_END*60;
    positions.push({task:t,startMin:cursor,mins});
    cursor+=mins;
  }
  return positions;
}

// Lunch position: find if any task ends before lunch
function lunchY(){return minToY(LUNCH_START*60)}
function lunchH(){return(LUNCH_END-LUNCH_START)*60*PX_PER_MIN}

function minToY(min){
  // Lunch gap rendered at half size for compactness
  let m=min-START_HOUR*60;
  if(min>=LUNCH_END*60){
    // Subtract half the lunch duration to compress
    m-=(LUNCH_END-LUNCH_START)*60*0.5;
  } else if(min>LUNCH_START*60 && min<LUNCH_END*60){
    m=(LUNCH_START-START_HOUR)*60;
  }
  return m*PX_PER_MIN;
}
function totalHeight(){
  let maxEnd=18*60;
  for(const day of DAYS){
    const pos=computePositions(day);
    if(pos.length){const last=pos[pos.length-1];maxEnd=Math.max(maxEnd,last.startMin+last.mins);}
  }
  return minToY(maxEnd)+20;
}
function timeLabel(min){const h=Math.floor(min/60),m=min%60;return`${h}h${m?String(m).padStart(2,"0"):""}`}

// ══════ DRAG & DROP ══════
let drag=null,ghost=null,dropInfo=null,resizing=null;
// Pointer tracking: distinguish click from drag
let ptrDown=null; // {e, day, idx, pos, moved}
let longPress=null,lpData=null;

function getP(e){return e.touches?{x:e.touches[0].clientX,y:e.touches[0].clientY}:{x:e.clientX,y:e.clientY}}

function actuallyStartDrag(day,idx,pos){
  const t=S.sched[day][idx];
  ghost=document.createElement("div");ghost.className="ghost";ghost.textContent=t.icon+" "+t.task;
  ghost.style.left=pos.x+"px";ghost.style.top=pos.y+"px";
  document.body.appendChild(ghost);
  drag={day,idx,id:t.id};
  const el=document.querySelector(`[data-tid="${t.id}"]`);if(el)el.classList.add("dragging");
  document.body.style.overflow="hidden";
}

function onMoveGlobal(e){
  if(resizing){doResize(e);return;}

  // Check if pointer is down but drag hasn't started — detect movement threshold
  if(ptrDown&&!ptrDown.moved&&!drag){
    const p=getP(e);
    const dx=Math.abs(p.x-ptrDown.pos.x),dy=Math.abs(p.y-ptrDown.pos.y);
    if(dx>5||dy>5){
      ptrDown.moved=true;
      // Cancel long press if active
      if(longPress){clearTimeout(longPress);longPress=null;lpData=null;}
      actuallyStartDrag(ptrDown.day,ptrDown.idx,p);
    }
    return;
  }

  // Touch long press movement cancel
  if(!drag&&longPress&&lpData){
    const p=getP(e),d=lpData.pos;
    if(Math.abs(p.x-d.x)>8||Math.abs(p.y-d.y)>8){clearTimeout(longPress);longPress=null;lpData=null;}
    return;
  }

  if(!drag)return;
  if(e.cancelable)e.preventDefault();
  const p=getP(e);
  ghost.style.left=p.x+"px";ghost.style.top=p.y+"px";
  if(p.y<50)window.scrollBy(0,-6);else if(p.y>window.innerHeight-50)window.scrollBy(0,6);

  document.querySelectorAll(".tblock").forEach(el=>el.style.outline="");
  dropInfo=null;
  const cols=document.querySelectorAll(".day-col");
  for(const col of cols){
    const r=col.getBoundingClientRect();
    if(p.x>=r.left&&p.x<=r.right){
      const dayName=col.dataset.day;
      const body=col.querySelector(".day-col-body");
      const br=body.getBoundingClientRect();
      const relY=p.y-br.top+body.scrollTop;
      let targetMin=START_HOUR*60+relY/PX_PER_MIN;
      const positions=computePositions(dayName);
      let insertIdx=positions.length;
      for(let i=0;i<positions.length;i++){
        const mid=positions[i].startMin+positions[i].mins/2;
        if(targetMin<mid){insertIdx=i;break;}
      }
      dropInfo={day:dayName,idx:insertIdx};
      if(positions[insertIdx]){
        const el=document.querySelector(`[data-tid="${positions[insertIdx].task.id}"]`);
        if(el)el.style.outline="2px solid #111";
      }
      break;
    }
  }
}

function onUpGlobal(){
  if(resizing){endResize();return;}
  if(longPress){clearTimeout(longPress);longPress=null;}

  // If pointer was down but never moved → it's a CLICK → open modal
  if(ptrDown&&!ptrDown.moved&&!drag){
    const{day,idx}=ptrDown;
    ptrDown=null;lpData=null;
    S.selTask={day,idx};render();
    return;
  }

  ptrDown=null;lpData=null;

  if(!drag){return;}
  document.querySelectorAll(".tblock").forEach(el=>{el.style.outline="";el.classList.remove("dragging")});
  if(dropInfo&&S.sched){
    const ns=JSON.parse(JSON.stringify(S.sched));
    const[item]=ns[drag.day].splice(drag.idx,1);
    let ti=dropInfo.idx;
    if(drag.day===dropInfo.day&&ti>drag.idx)ti--;
    if(ti<0)ti=0;
    if(ti>ns[dropInfo.day].length)ti=ns[dropInfo.day].length;
    ns[dropInfo.day].splice(ti,0,item);
    S.sched=ns;saveS();
  }
  if(ghost)ghost.remove();
  drag=null;ghost=null;dropInfo=null;
  document.body.style.overflow="";
  render();
}

// Resize
function startResize(e,day,idx){
  e.stopPropagation();if(e.cancelable)e.preventDefault();
  const pos=computePositions(day);
  resizing={day,idx,id:S.sched[day][idx].id,startY:getP(e).y,origMins:pos[idx].mins};
  document.body.style.overflow="hidden";
}
function doResize(e){
  if(!resizing)return;if(e.cancelable)e.preventDefault();
  const dy=getP(e).y-resizing.startY;
  const newMins=Math.max(15,Math.round((resizing.origMins+dy/PX_PER_MIN)/15)*15);
  if(!S.data[resizing.id])S.data[resizing.id]={done:false,note:"",realMins:null};
  S.data[resizing.id].realMins=newMins;
  saveD();render();
}
function endResize(){resizing=null;document.body.style.overflow="";render();}

// Touch long press
function onTS(e,day,idx){
  if(e.target.closest(".tb-check")||e.target.closest(".tb-resize"))return;
  lpData={e,day,idx};
  longPress=setTimeout(()=>{startDragBlock(lpData.e,lpData.day,lpData.idx);if(navigator.vibrate)navigator.vibrate(30);},250);
}

document.addEventListener("touchmove",onMoveGlobal,{passive:false});
document.addEventListener("touchend",onUpGlobal);
document.addEventListener("touchcancel",onUpGlobal);
document.addEventListener("mousemove",onMoveGlobal);
document.addEventListener("mouseup",onUpGlobal);

        <div class="field"><label>mover para dia</label>
          <div style="display:flex;gap:4px">${DAYS.map(d=>`<button onclick="moveTask('${day}',${idx},'${d}')" style="flex:1;padding:6px 0;border-radius:6px;cursor:pointer;border:${d===day?"1.5px solid #111":"1px solid #DDD"};background:${d===day?"#111":"#FFF"};color:${d===day?"#FFF":"#111"};font-size:11px;font-weight:600;font-family:inherit">${d}</button>`).join("")}</div>
        </div>
        <div class="links-section field">
          <label>🔗 links e arquivos</label>
          <div class="link-add">
            <input type="text" id="m-link" placeholder="colar URL (Drive, Notion, Figma...)" onkeydown="if(event.key==='Enter')addLink('${t.id}')">
            <button onclick="addLink('${t.id}')">anexar</button>
          </div>
          <div class="link-quick">
            <button onclick="newGoogleFile('doc','${t.id}','${esc(t.task)}')"><span class="lq-icon">📄</span> Novo Doc</button>
            <button onclick="newGoogleFile('sheet','${t.id}','${esc(t.task)}')"><span class="lq-icon">📊</span> Nova Sheet</button>
            <button onclick="newGoogleFile('slides','${t.id}','${esc(t.task)}')"><span class="lq-icon">📽️</span> Novo Slides</button>
          </div>
          <div class="link-list">${(e.links||[]).map((lk,li)=>{
            const ico=lk.pending&&!lk.url?"⏳":getLinkIcon(lk.url);
            const name=lk.name||extractLinkName(lk.url);
            if(lk.pending&&!lk.url){
              return`<div class="link-item" style="background:#FFF9E6;border:1px dashed #EAB308"><span class="li-icon">${ico}</span><span style="flex:1;font-size:10px;color:#92690B">${esc(name)} — cole a URL acima e clique anexar</span><button class="li-del" onclick="removeLink('${t.id}',${li})">✕</button></div>`;
            }
            return`<div class="link-item"><span class="li-icon">${ico}</span><span class="li-name" onclick="window.open('${esc(lk.url)}','_blank')">${esc(name)}</span><button class="li-del" onclick="removeLink('${t.id}',${li})">✕</button></div>`;
          }).join("")}${!(e.links&&e.links.length)?'<div style="font-size:10px;color:#CCC;text-align:center;padding:4px 0">nenhum link anexado</div>':""}</div>
        </div>
        ${t.auto?`<div style="margin-top:8px;padding:6px 8px;background:#F8F8F8;border-radius:6px;border-left:2px solid #DDD"><div style="font-size:9px;font-weight:700;color:#BBB;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px">⚡ automação</div><p style="font-size:11px;color:#666;line-height:1.5;margin:0">${t.auto}</p></div>`:""}
        <button class="save-btn" onclick="saveTask('${t.id}','${day}',${idx})">salvar</button>
      </div></div>`;
    }
  }

  return `<div class="tl-layout">${tl}${sb}</div>${modal}`;
}

function renderDay(wd,td){
  let h=`<div class="day-pills">${DAYS.map((d,i)=>{const s=dStats(d);return`<button class="day-pill ${wd[i]===td?"today":""} ${S.activeDay===d?"active":""}" onclick="setAD('${d}')"><div class="nm">${d}</div><div style="font-size:8px;color:${S.activeDay===d?"rgba(255,255,255,.5)":"#BBB"};margin:1px 0">${wd[i]}</div><div class="st">${s.pct}%</div></button>`}).join("")}</div>`;
  const days=S.activeDay?[S.activeDay]:DAYS;
  days.forEach(day=>{
    if(!S.activeDay)h+=`<div class="dlabel">${day} · ${wd[DAYS.indexOf(day)]}</div>`;
    h+=`<div class="dlist">`;
    const pos=computePositions(day);
    pos.forEach((p,i)=>{
      const t=p.task,e=S.data[t.id]||{done:false,note:"",realMins:null};
      const col=CC[t.cat]||"#999";
      const isExp=S.exp===t.id,isEN=S.enote===t.id,isET=S.etime===t.id;
      const realMins=e.realMins??t.mins;
      const timeStr=`${timeLabel(p.startMin)}–${timeLabel(p.startMin+p.mins)}`;
      const rtHtml=e.realMins!=null&&e.realMins!==t.mins?`<span class="rt ${e.realMins>t.mins?"over":"under"}">→ ${fmtM(e.realMins)}</span>`:"";
      // Height bar: visual proportion
      const maxBar=120;const planW=Math.min(t.mins/maxBar*100,100);const realW=Math.min(realMins/maxBar*100,100);

      let extra="";
      extra+=`<div class="lc-hbar"><div class="bar-bg"><div class="bar-plan" style="width:${planW}%;background:${col}40"></div>${e.realMins!=null?`<div class="bar-real" style="width:${realW}%;background:${col}"></div>`:""}</div><div class="bar-label">${fmtM(realMins)}</div></div>`;
      extra+=`<div class="lc-actions">
        <button onclick="tgE('${t.id}')" ${isExp?"class='has'":""}>${isExp?"− ocultar":"+ detalhes"}${t.auto&&!isExp?" · ⚡":""}</button>
        <button onclick="tgN('${t.id}')" ${e.note?"class='has'":""}>${e.note?"📝 nota":"+ nota"}</button>
        <button onclick="tgT('${t.id}')" ${e.realMins!=null?"class='has'":""}>⏱ tempo real</button>
      </div>`;
      if(isExp){extra+=`<div class="lc-detail"><p>${t.desc}</p>`;if(t.auto)extra+=`<div class="abox"><div class="al">⚡ automação</div><p>${t.auto}</p></div>`;extra+=`</div>`;}
      if(e.note&&!isEN)extra+=`<div class="note-show">${esc(e.note)}</div>`;
      if(isEN)extra+=`<div class="iedit"><input type="text" id="ni" value="${esc(e.note||"")}" placeholder="nota rápida..." onkeydown="if(event.key==='Enter')sN('${t.id}')"><button onclick="sN('${t.id}')">ok</button></div>`;
      if(isET)extra+=`<div class="iedit"><input type="number" id="ti" value="${e.realMins??t.mins}" onkeydown="if(event.key==='Enter')sT('${t.id}')"><span class="u">min</span><button onclick="sT('${t.id}')">ok</button></div>`;

      h+=`<div class="lcard ${e.done?"done":""}" style="border-left:3px solid ${col}"><div class="lc-top">
        <div class="lc-check ${e.done?"checked":""}" onclick="tgD('${t.id}')"></div>
        <div class="lc-info">
          <div class="lc-title"><span class="icon">${t.icon}</span><span class="name">${t.task}</span></div>
          <div class="lc-meta"><span class="time">${timeStr}</span><span class="dur" style="color:${col};background:${col}15">${fmtM(t.mins)}</span>${rtHtml}</div>
          ${extra}
        </div>
      </div></div>`;
    });
    h+=`</div>`;
  });
  return h;
}

function renderSum(all){
  const cs={};all.forEach(t=>{if(!cs[t.cat])cs[t.cat]={done:0,total:0,planned:0,real:0};cs[t.cat].total++;cs[t.cat].planned+=t.mins||0;if(S.data[t.id]?.done){cs[t.cat].done++;cs[t.cat].real+=S.data[t.id]?.realMins??t.mins??0;}});
  const planned=all.reduce((s,t)=>s+(t.mins||0),0);
  const real=all.reduce((s,t)=>s+(S.data[t.id]?.realMins??(S.data[t.id]?.done?t.mins:0)??0),0);
  const diff=real-planned;

  let h=`<div class="card"><h3>por categoria</h3>`;
  Object.entries(cs).sort((a,b)=>b[1].total-a[1].total).forEach(([c,s])=>{const p=Math.round(s.done/s.total*100);const ti=s.real>0?` · ⏱${fmtM(s.real)}/${fmtM(s.planned)}`:"";h+=`<div class="cr"><div class="top"><span class="nm">${CL[c]}</span><span class="ns">${s.done}/${s.total}${ti}</span></div><div class="cb"><div class="cf" style="width:${p}%;background:${CC[c]}"></div></div></div>`;});
  h+=`</div><div class="card"><h3>por dia</h3><div class="dbars">`;
  DAYS.forEach(d=>{const s=dStats(d);h+=`<div class="dbar"><div class="cw"><div class="cl" style="height:${Math.max(s.pct,4)}%;background:${s.pct===100?"#22C55E":"#111"}"></div></div><div class="dl">${d}</div><div class="dv">${s.pct}%</div></div>`;});
  h+=`</div></div><div class="card"><h3>⏱ planejado vs. real</h3><div class="tc">
    <div class="it"><span>Planejado</span><div>${fmtM(planned)}</div></div>
    <div class="it"><span>Real</span><div>${fmtM(real)}</div></div>
    <div class="it"><span>Dif.</span><div style="color:${diff>0?"#EF4444":"#22C55E"}">${diff>0?"+":""}${fmtM(Math.abs(diff))}</div></div>
  </div></div>`;
  h+=`<div class="card"><h3>📝 notas</h3><div class="nl">`;
  const noted=all.filter(t=>S.data[t.id]?.note);
  if(!noted.length)h+=`<p style="font-size:12px;color:#999">nenhuma nota esta semana</p>`;
  else noted.forEach(t=>{h+=`<div class="ni" style="border-left:2px solid ${CC[t.cat]}"><div class="nt">${t.icon} ${t.task}</div><div class="nx">${esc(S.data[t.id].note)}</div></div>`;});
  h+=`</div></div><button class="rbtn" onclick="resetW()">resetar semana</button>`;
  return h;
}

function renderAuto(){
  let h=`<div class="asec"><p class="intro">⚡ Automações usando n8n, Apify e Claude Cowork.</p>`;
  DAYS.forEach(d=>{const au=S.sched[d].filter(t=>t.auto);if(!au.length)return;h+=`<div class="dlabel">${d}</div>`;au.forEach(t=>{h+=`<div class="acard" style="border-left:3px solid ${CC[t.cat]}"><div class="at">${t.icon} ${t.task} <span class="tt">${fmtM(t.mins)}</span></div><div class="ab"><p>⚡ ${t.auto}</p></div></div>`;});});
  h+=`</div>`;return h;
}

// ══════ GLOBAL ACTIONS ══════
window.chgW=(n)=>{S.week=shiftW(S.week,n);S.exp=S.enote=S.etime=null;load();render()};
window.setV=(v)=>{S.view=v;S.exp=S.enote=S.etime=null;render()};
window.setAD=(d)=>{S.activeDay=S.activeDay===d?null:d;render()};
window.tgD=(id)=>{if(!S.data[id])S.data[id]={done:false,note:"",realMins:null};S.data[id]={...S.data[id],done:!S.data[id].done};saveD();render()};

window.dismissTask=(day,idx,id)=>{
  if(!confirm("Remover este evento desta semana?"))return;
  if(!S.data[id])S.data[id]={done:false,note:"",realMins:null};
  S.data[id].dismissed=true;
  saveD();render();
};
window.tgE=(id)=>{S.exp=S.exp===id?null:id;render()};
window.tgN=(id)=>{S.enote=S.enote===id?null:id;S.etime=null;render();if(S.enote)setTimeout(()=>{const el=document.getElementById("ni");if(el)el.focus()},50)};
window.tgT=(id)=>{S.etime=S.etime===id?null:id;S.enote=null;render();if(S.etime)setTimeout(()=>{const el=document.getElementById("ti");if(el)el.focus()},50)};
window.sN=(id)=>{const el=document.getElementById("ni");if(!el)return;if(!S.data[id])S.data[id]={done:false,note:"",realMins:null};S.data[id].note=el.value;S.enote=null;saveD();render()};
window.sT=(id)=>{const el=document.getElementById("ti");if(!el)return;const v=parseInt(el.value);if(isNaN(v)||v<0)return;if(!S.data[id])S.data[id]={done:false,note:"",realMins:null};S.data[id].realMins=v;S.etime=null;saveD();render()};
window.resetW=()=>{if(!confirm("Resetar tudo desta semana?"))return;S.data={};S.sched=getDefaultSchedule(S.week);S.memos=[];localStorage.removeItem(dk());localStorage.removeItem(sk());localStorage.removeItem(mk());render()};
window.addMemo=()=>{const el=document.getElementById("memo-in");if(!el||!el.value.trim())return;S.memos.push({text:el.value.trim(),done:false});saveM();render();setTimeout(()=>{const i=document.getElementById("memo-in");if(i)i.focus()},50)};
window.tgMemo=(i)=>{S.memos[i].done=!S.memos[i].done;saveM();render()};
window.delMemo=(i)=>{S.memos.splice(i,1);saveM();render()};

// Sidebar links (global)
window.addSideLink=()=>{
  const el=document.getElementById("sl-url");
  if(!el||!el.value.trim())return;
  let url=el.value.trim();
  if(!url.startsWith("http"))url="https://"+url;
  const name=prompt("Nome do link (ou deixe vazio):")||"";
  S.sideLinks.push({url,name});
  saveSL();render();
  setTimeout(()=>{const inp=document.getElementById("sl-url");if(inp){inp.value="";inp.focus();}},50);
};
window.delSideLink=(i)=>{S.sideLinks.splice(i,1);saveSL();render()};
window.newSideFile=(type)=>{
  const urls={doc:"https://docs.google.com/document/create?usp=sheets_home&oi=doc",sheet:"https://docs.google.com/spreadsheets/create?usp=sheets_home",slides:"https://docs.google.com/presentation/create?usp=slides_home"};
  const names={doc:"Google Doc",sheet:"Google Sheet",slides:"Google Slides"};
  window.open(urls[type],"_blank");
  const name=prompt("Nome para o "+names[type]+" (ou deixe vazio):")||names[type];
  // User needs to paste real URL
  setTimeout(()=>{
    const realUrl=prompt("Cole a URL do "+names[type]+" criado:");
    if(realUrl&&realUrl.trim()){
      S.sideLinks.push({url:realUrl.trim(),name});
      saveSL();render();
    }
  },2000);
};
window.onMD=(e,d,i)=>{
  if(e.target.closest(".tb-check")||e.target.closest(".tb-resize"))return;
  e.preventDefault();
  ptrDown={day:d,idx:i,pos:getP(e),moved:false};
};
window.onTS=(e,d,i)=>{
  if(e.target.closest(".tb-check")||e.target.closest(".tb-resize"))return;
  const pos=getP(e);
  ptrDown={day:d,idx:i,pos,moved:false};
  lpData={day:d,idx:i,pos};
  longPress=setTimeout(()=>{
    if(ptrDown&&!ptrDown.moved){
      ptrDown.moved=true;
      actuallyStartDrag(d,i,pos);
      if(navigator.vibrate)navigator.vibrate(30);
    }
  },300);
};
window.startR=(e,d,i)=>{ptrDown=null;startResize(e,d,i)};

// ══════ LINK HELPERS ══════
function getLinkIcon(url){
  if(!url)return"🔗";
  if(url.includes("docs.google.com/document"))return"📄";
  if(url.includes("docs.google.com/spreadsheets"))return"📊";
  if(url.includes("docs.google.com/presentation"))return"📽️";
  if(url.includes("drive.google.com"))return"📁";
  if(url.includes("notion.so")||url.includes("notion.site"))return"📓";
  if(url.includes("figma.com"))return"🎨";
  if(url.includes("canva.com"))return"🖼️";
  if(url.includes("miro.com"))return"🟡";
  if(url.includes("trello.com"))return"📋";
  if(url.includes("github.com"))return"🐙";
  if(url.includes("youtube.com")||url.includes("youtu.be"))return"▶️";
  if(url.includes("loom.com"))return"🎥";
  return"🔗";
}
function extractLinkName(url){
  try{
    const u=new URL(url);
    if(u.hostname.includes("docs.google.com")){
      if(url.includes("/document/"))return"Google Doc";
      if(url.includes("/spreadsheets/"))return"Google Sheet";
      if(url.includes("/presentation/"))return"Google Slides";
    }
    if(u.hostname.includes("drive.google.com"))return"Google Drive";
    if(u.hostname.includes("notion"))return"Notion";
    if(u.hostname.includes("figma"))return"Figma";
    if(u.hostname.includes("canva"))return"Canva";
    return u.hostname.replace("www.","");
  }catch{return url.substring(0,40)}
}
window.getLinkIcon=getLinkIcon;
window.extractLinkName=extractLinkName;

window.addLink=(id)=>{
  const el=document.getElementById("m-link");
  if(!el||!el.value.trim())return;
  let url=el.value.trim();
  if(!url.startsWith("http"))url="https://"+url;
  if(!S.data[id])S.data[id]={done:false,note:"",realMins:null,userDesc:"",links:[]};
  if(!S.data[id].links)S.data[id].links=[];
  // Check if there's a pending link to update
  const pendingIdx=S.data[id].links.findIndex(l=>l.pending&&!l.url);
  if(pendingIdx>=0){
    S.data[id].links[pendingIdx].url=url;
    S.data[id].links[pendingIdx].pending=false;
  } else {
    S.data[id].links.push({url,name:""});
  }
  saveD();render();
  setTimeout(()=>{const inp=document.getElementById("m-link");if(inp){inp.value="";inp.focus();}},80);
};

window.removeLink=(id,idx)=>{
  if(!S.data[id]?.links)return;
  S.data[id].links.splice(idx,1);
  saveD();render();
};

window.newGoogleFile=(type,id,taskName)=>{
  // These URLs create a NEW file and redirect to it with a real URL
  const urls={
    doc:"https://docs.google.com/document/create?usp=sheets_home&oi=doc",
    sheet:"https://docs.google.com/spreadsheets/create?usp=sheets_home",
    slides:"https://docs.google.com/presentation/create?usp=slides_home",
  };
  const newUrl=urls[type];
  if(!newUrl)return;
  // Open new file — Google will redirect to the actual doc URL
  window.open(newUrl,"_blank");
  // Add a placeholder — user should paste real URL after
  if(!S.data[id])S.data[id]={done:false,note:"",realMins:null,userDesc:"",links:[]};
  if(!S.data[id].links)S.data[id].links=[];
  const names={doc:"📄 Google Doc",sheet:"📊 Google Sheet",slides:"📽️ Google Slides"};
  S.data[id].links.push({url:"",name:names[type]+" — "+taskName,pending:true});
  saveD();render();
  // Focus the link input so user can paste the real URL
  setTimeout(()=>{
    const inp=document.getElementById("m-link");
    if(inp){inp.placeholder="cole a URL do arquivo criado aqui...";inp.focus();}
  },100);
};

window.closeTask=(e)=>{if(e&&e.target&&!e.target.classList.contains("modal-overlay"))return;S.selTask=null;render()};
window.saveTask=(id,day,idx)=>{
  const desc=document.getElementById("m-desc")?.value||"";
  const dur=parseInt(document.getElementById("m-dur")?.value);
  const note=document.getElementById("m-note")?.value||"";
  if(!S.data[id])S.data[id]={done:false,note:"",realMins:null,userDesc:"",links:[]};
  S.data[id].userDesc=desc;
  S.data[id].note=note;
  if(!isNaN(dur)&&dur>=15)S.data[id].realMins=dur;
  if(!S.data[id].links)S.data[id].links=[];
  S.selTask=null;saveD();render();
};
window.moveTask=(fromDay,idx,toDay)=>{
  if(fromDay===toDay)return;
  const ns=JSON.parse(JSON.stringify(S.sched));
  const[item]=ns[fromDay].splice(idx,1);
  ns[toDay].push(item);
  S.sched=ns;S.selTask={day:toDay,idx:ns[toDay].length-1};
  saveS();render();
};

load();render();
</script>
